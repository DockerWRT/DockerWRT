<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>OpenWrt Portal</title>
        <style>
            body {
                background: white;
                font-family: arial, helvetica, sans-serif;
                margin: 24px;
            }

            a { color: black; }

            ul {
                list-style: none;
                padding: 0;
                margin: 0;
                text-align: center;
            }

            li { margin-bottom: 14px; }

            #localServiceLink {
                font-size: 32px;
                font-weight: bold;
                color: #0b7d27;
                text-decoration: none;
            }

            @media (prefers-color-scheme: dark) {
                body { background: black; }
                a { color: white; }
                #localServiceLink { color: #6ff58d; }
            }
        </style>
    </head>
    <body>
        <ul>
            <li><a href="cgi-bin/luci/">设备管理</a></li>
            <li><a id="localServiceLink" href="#" target="_blank" rel="noopener noreferrer">AI智能体</a></li>
        </ul>

        <script>
            (function() {
                var protocol = "http://";
                document.getElementById("localServiceLink").href = protocol + window.location.hostname + ":18800";
            })();
        </script>
    </body>
</html>
